<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactFoundry.Blazor.Charts - WASM Demo</title>
    <base href="/" />
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
            --nav-bg: #1e293b;
            --nav-text: #94a3b8;
            --nav-text-active: #ffffff;
            --border: #e2e8f0;
        }
        .dark-theme {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --nav-bg: #020617;
            --nav-text: #64748b;
            --nav-text-active: #f1f5f9;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            color: var(--text);
            background: var(--bg);
            transition: background 0.2s, color 0.2s;
        }
        h1, h2, h3 { margin-top: 0; }
        a.active { color: var(--nav-text-active) !important; font-weight: bold; }
        .theme-toggle {
            background: none;
            border: 1px solid var(--nav-text);
            color: var(--nav-text);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .theme-toggle:hover {
            color: var(--nav-text-active);
            border-color: var(--nav-text-active);
        }
    </style>
</head>
<body>
    <div id="app">Loading...</div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
